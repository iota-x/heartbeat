# Render blueprint — free-tier deploy of the ingest websocket server.
# render.com → New → Blueprint → pick this repo. Free instances sleep after
# 15min idle (~1min wake); the web client falls back to synthetic and
# reconnects automatically, so cold starts never black-screen the site.
services:
  - type: web
    name: heartbeat-ingest
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8787"
      # keyless: PublicNode blockSubscribe, zero credit burn.
      # add HELIUS_API_KEY in the dashboard for ~3s latency instead of ~1min.
